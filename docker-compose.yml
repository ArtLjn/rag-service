services:
  rag-service:
    build: .
    container_name: rag-service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_MODEL=BAAI/bge-large-zh-v1.5
      - RERANKER_MODEL=BAAI/bge-reranker-v2-m3
      - DEFAULT_CHUNK_SIZE=500
      - DEFAULT_TOP_K=10
      - RRF_K=60
      - RRF_VECTOR_WEIGHT=0.7
      - RRF_SPARSE_WEIGHT=0.3
      - HTTP_TIMEOUT=10
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-service-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo GET /healthz HTTP/1.0 >&3; cat <&3' | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
