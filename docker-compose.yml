services:
  quillrag:
    build: .
    container_name: quillrag
    env_file:
      - .env
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - QDRANT_URL=http://qdrant:6333
      - METADATA_DB_PATH=/app/data/rag_metadata.db
      - RERANKER_FLASHRANK_CACHE_DIR=/app/data/flashrank_cache
    volumes:
      - quillrag_data:/app/data
      - hf_cache:/opt/hf-cache
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: quillrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo GET /healthz HTTP/1.0 >&3; cat <&3' | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  quillrag_data:
  hf_cache:
