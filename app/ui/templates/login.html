{% extends "base.html" %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="bg-white rounded-lg shadow p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-3xl mb-2">🔐</div>
      <h1 class="text-xl font-bold text-slate-900">rag-service 登录</h1>
      <p class="text-xs text-slate-500 mt-1">公网访问需要鉴权</p>
    </div>

    {% if error %}
    <div class="bg-rose-50 border border-rose-200 text-rose-700 text-sm px-3 py-2 rounded mb-4">
      ⚠ {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/ui/login" class="space-y-4">
      <input type="hidden" name="next" value="{{ next }}">
      <div>
        <label class="block text-sm font-medium mb-1">用户名</label>
        <input type="text" name="username" required autofocus
          class="w-full border rounded px-3 py-2 text-sm" placeholder="admin">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">密码</label>
        <input type="password" name="password" required
          class="w-full border rounded px-3 py-2 text-sm">
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 text-white py-2 rounded text-sm font-medium hover:bg-indigo-700">
        登录
      </button>
    </form>

    <div class="mt-6 pt-4 border-t border-slate-100 text-xs text-slate-500 space-y-1">
      <div>📌 API 调用可用 <code class="bg-slate-50 px-1">X-API-Key</code> 头跳过登录</div>
      <div>📌 健康检查 <code class="bg-slate-50 px-1">/health</code> 不需鉴权</div>
    </div>
  </div>
</div>
{% endblock %}
