<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2F81F7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="quillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2F81F7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="220" fill="url(#bg)" rx="14"/>

  <!-- 装饰背景：网格点 -->
  <g opacity="0.08" fill="#2F81F7">
    <circle cx="30" cy="30" r="1.5"/><circle cx="60" cy="30" r="1.5"/><circle cx="90" cy="30" r="1.5"/>
    <circle cx="30" cy="60" r="1.5"/><circle cx="60" cy="60" r="1.5"/><circle cx="90" cy="60" r="1.5"/>
    <circle cx="710" cy="160" r="1.5"/><circle cx="740" cy="160" r="1.5"/><circle cx="770" cy="160" r="1.5"/>
    <circle cx="710" cy="190" r="1.5"/><circle cx="740" cy="190" r="1.5"/><circle cx="770" cy="190" r="1.5"/>
  </g>

  <!-- 鹅毛笔 Logo（简化版，所有坐标确保在 viewBox 内） -->
  <g transform="translate(80, 60)">
    <!-- 笔羽外形（贝塞尔曲线，控制点全部 x>=0） -->
    <path d="M 25 5 Q 55 25 65 75 L 50 90 Q 35 70 25 45 Q 18 25 25 5 Z"
          fill="url(#quillGrad)" opacity="0.85"/>
    <!-- 笔羽中央纹理 -->
    <path d="M 30 15 Q 45 40 55 80"
          stroke="#0d1117" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- 笔杆 -->
    <path d="M 50 90 L 15 125"
          stroke="url(#quillGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- 笔尖（金属头） -->
    <circle cx="15" cy="125" r="4" fill="url(#quillGrad)"/>
  </g>

  <!-- 主标题 QuillRAG -->
  <text x="220" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="url(#text)" letter-spacing="-1.5">QuillRAG</text>

  <!-- 副标题（英文） -->
  <text x="222" y="138" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="15" font-weight="400" fill="#8b949e">Independent RAG service · MinerU PDF parsing · Hybrid retrieval · Cross-Encoder rerank</text>

  <!-- 底部 tagline（中文） -->
  <text x="222" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" fill="#6e7681">独立 RAG 服务 · PDF 复杂解析 · 混合检索 · 重排序</text>

  <!-- 底部装饰线（蓝青渐变细线） -->
  <rect x="222" y="178" width="120" height="2" rx="1" fill="url(#quillGrad)"/>
</svg>
